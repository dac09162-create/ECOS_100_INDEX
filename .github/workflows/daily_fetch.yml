name: Daily ECOS Data Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pandas duckdb

      - name: 데이터 수집 실행
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python fetch_ecos.py

      - name: DB 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ecos_warehouse.db
          git diff --staged --quiet || git commit -m "📊 Daily update $(date '+%Y-%m-%d KST')"
          git push
